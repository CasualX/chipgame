<svg xmlns="http://www.w3.org/2000/svg" width="220" height="100" viewBox="0 0 220 100" role="img" aria-labelledby="title desc">
  <title id="title">Download Chip's Challenge DX</title>
  <desc id="desc">Left half of a segmented button linking to the latest Chip's Challenge DX Windows release.</desc>
  <defs>
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#44d489"/>
      <stop offset="100%" stop-color="#14995a"/>
    </linearGradient>
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="btnShadow" x="-18%" y="-28%" width="136%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0a5d31" flood-opacity="0.28"/>
    </filter>
  </defs>
  <g filter="url(#btnShadow)">
    <path d="M220 10V90H32C23.163 90 16 82.837 16 74V26C16 17.163 23.163 10 32 10H220Z" fill="url(#btnGradient)"/>
    <path d="M220 10V28H16V26C16 17.163 23.163 10 32 10H220Z" fill="url(#shineGradient)"/>
    <g fill="#ffffff" font-family="'Trebuchet MS', 'Segoe UI', Tahoma, sans-serif" text-anchor="middle">
      <text x="92" y="47" font-size="19" font-weight="700">Download</text>
      <text x="92" y="69" font-size="13" opacity="0.9">Windows Release</text>
    </g>
    <g transform="translate(164 27)">
      <circle cx="24" cy="23" r="20" fill="#ffffff" fill-opacity="0.18"/>
      <path d="M24 11v20" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <path d="M15 22l9 9 9-9" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="15" y="34" width="18" height="4" rx="2" fill="#ffffff"/>
    </g>
  </g>
</svg>