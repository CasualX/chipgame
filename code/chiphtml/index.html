<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Chip's Challenge by Casper</title>
		<link rel="stylesheet" href="./index.css" />
	</head>
	<body>
		<div id="root" x-data="chipGame()" x-init="init()">
			<canvas id="game" x-ref="canvas"></canvas>
			<div id="hud" x-text="hudText"></div>
			<button id="display-mode-cta" type="button" x-show="showDisplayModeCta" @click="requestPreferredDisplayMode()">
				<span id="display-mode-cta-icon" aria-hidden="true">⛶</span>
				<span>Fullscreen</span>
			</button>
			<div
				id="loading-screen"
				aria-live="polite"
				x-show="!gameActive"
				@pointerdown="onActivationPointerDown()"
				@touchstart.prevent="onActivationTouchStart()"
				@touchend.prevent="onActivationTouchEnd()"
				@touchcancel.prevent="onActivationTouchEnd()"
				@pointerup="onActivationPointerEnd()"
				@pointercancel="onActivationPointerEnd()"
			>
				<div id="loading-panel">
					<div id="loading-title">Play Chip's Challenge!</div>
					<div id="loading-subtitle">Loading the game session</div>
					<div id="loading-bar"><span :style="{ width: Math.round(loadingProgress * 100) + '%' }"></span></div>
					<div id="loading-status" x-text="loadingStatus"></div>
					<div id="loading-hint">
						<strong>Keyboard:</strong> Arrows/WASD move, A=Space, B=Backspace, Start=Enter, Select=Shift<br />
						<strong>Gamepad:</strong> D-Pad or left stick moves, A, B, Start, Select<br />
						<strong>Touch:</strong> On-screen pad + buttons supported
					</div>
					<div id="loading-ready" x-show="loadingReadyVisible" x-text="loadingReadyText"></div>
				</div>
			</div>
			<div id="touch-controls" :class="{ enabled: touchEnabled }" :aria-hidden="touchEnabled ? 'false' : 'true'">
				<div
					class="pad"
					id="touch-pad"
					x-ref="touchPad"
					aria-hidden="true"
					@touchstart.prevent="onPadTouchStart($event)"
					@touchmove.prevent="onPadTouchMove($event)"
					@touchend.prevent="onPadTouchEnd($event)"
					@touchcancel.prevent="onPadTouchEnd($event)"
				>
					<div class="dir up" :class="{ active: padDir === 'up' }">▲</div>
					<div class="dir down" :class="{ active: padDir === 'down' }">▼</div>
					<div class="dir left" :class="{ active: padDir === 'left' }">◀</div>
					<div class="dir right" :class="{ active: padDir === 'right' }">▶</div>
				</div>
				<div class="cluster">
					<button data-btn="b" :class="{ active: touchPressed.b }" @touchstart.prevent="pressTouchButton('b')" @touchend.prevent="releaseTouchButton('b')" @touchcancel.prevent="releaseTouchButton('b')">B</button>
					<button data-btn="a" :class="{ active: touchPressed.a }" @touchstart.prevent="pressTouchButton('a')" @touchend.prevent="releaseTouchButton('a')" @touchcancel.prevent="releaseTouchButton('a')">A</button>
					<button data-btn="start" :class="{ active: touchPressed.start }" @touchstart.prevent="pressTouchButton('start')" @touchend.prevent="releaseTouchButton('start')" @touchcancel.prevent="releaseTouchButton('start')">Start</button>
					<button data-btn="select" :class="{ active: touchPressed.select }" @touchstart.prevent="pressTouchButton('select')" @touchend.prevent="releaseTouchButton('select')" @touchcancel.prevent="releaseTouchButton('select')">Select</button>
				</div>
			</div>
		</div>
		<script src="./index.js" type="module"></script>
		<script src="./alpine.min.js" defer></script>
	</body>
</html>
