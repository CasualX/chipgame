name: Build Android APK

on:
  workflow_dispatch:

jobs:
  android-apk:
    runs-on: ubuntu-latest

    env:
      CARGO_TERM_COLOR: always
      ANDROID_COMPILE_SDK: 36
      ANDROID_BUILD_TOOLS_VERSION: 36.0.0
      ANDROID_NDK_VERSION: 30.0.14904198

    steps:
    - name: Checkout Sources
      uses: actions/checkout@v6

    - name: Install Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '17'

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,x86_64-linux-android

    - name: Cache Rust Build
      uses: Swatinem/rust-cache@v2

    - name: Set Up Android SDK
      uses: android-actions/setup-android@v4

    - name: Install Android SDK Packages
      run: sdkmanager --install "platform-tools" "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" "ndk;${ANDROID_NDK_VERSION}"

    - name: Install Cargo Tools
      run: |
        cargo install cargo-ndk --locked
        cargo install paks --locked

    - name: Build Release APK
      working-directory: code/android
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
      run: ./gradlew :app:assembleRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v7
      with:
        name: chipdx-android-release-apk
        path: code/android/app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: error
